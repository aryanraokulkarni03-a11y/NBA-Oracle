services:
  - type: web
    name: nba-oracle-api
    runtime: python
    plan: starter
    rootDir: .
    buildCommand: pip install .
    startCommand: python main.py serve-api --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: ORACLE_DEPLOYMENT_TARGET
        value: vercel-render-supabase
      - key: ORACLE_LOCAL_AUTOSTART_MODE
        value: login
      - key: ORACLE_LOCAL_DASHBOARD_BEHAVIOR
        value: manual
      - key: ORACLE_FAILURE_ALERT_POLICY
        value: telegram-primary

  - type: cron
    name: nba-oracle-scheduler
    runtime: python
    schedule: "*/30 * * * *"
    rootDir: .
    buildCommand: pip install .
    startCommand: python main.py run-scheduler-once
    envVars:
      - key: ORACLE_DEPLOYMENT_TARGET
        value: vercel-render-supabase
